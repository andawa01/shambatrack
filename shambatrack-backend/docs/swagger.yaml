openapi: 3.0.0

info:
  title: ShambaTrack Cooperative Farmer Management API
  version: 1.0.0
  description: Backend system for farmers, loans, wallets, products, deliveries, notifications and cooperative management.

servers:
  - url: https://shambatrack.onrender.com/api

tags:
  - name: Auth
  - name: Farmer
  - name: Farmers
  - name: Products
  - name: Deliveries
  - name: Loans
  - name: Payments
  - name: Wallets
  - name: Notifications
  - name: Audit Logs
  - name: Dashboard

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    Farmer:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        cooperative_id: { type: string }
        phone: { type: string }
        email: { type: string }
        nid: { type: string }
        location: { type: string }

    Product:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        unit: { type: string }
        unit_price: { type: number }
        coop_id: { type: string }
        type: { type: string }

    Loan:
      type: object
      properties:
        id: { type: string }
        loan_number: { type: string }
        farmer_id: { type: string }
        coop_id: { type: string }
        principal: { type: number }
        current_balance: { type: number }
        status: { type: string }

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get authenticated user profile
      responses:
        "200":
          description: User profile returned

  /farmer/loans/apply:
    post:
      tags: [Farmer]
      summary: Apply for a loan
      responses:
        "200":
          description: Loan application submitted

  /farmer/loans:
    get:
      tags: [Farmer]
      summary: Get my loans
      responses:
        "200":
          description: Loan list

  /farmer/payments:
    get:
      tags: [Farmer]
      summary: Get wallet transactions
      responses:
        "200":
          description: Transactions returned

  /farmer/products:
    get:
      tags: [Farmer]
      summary: Get available products
      responses:
        "200":
          description: Product list

  /farmer/notifications:
    get:
      tags: [Farmer]
      summary: Get my notifications
      responses:
        "200":
          description: Notifications returned

  /farmer/notifications/{id}/read:
    patch:
      tags: [Farmer]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification updated

  /farmer/dashboard:
    get:
      tags: [Dashboard]
      summary: Farmer dashboard
      responses:
        "200":
          description: Dashboard summary

  /admin/farmers:
    get:
      tags: [Farmers]
      summary: Get all farmers
      responses:
        "200":
          description: Farmers list
    post:
      tags: [Farmers]
      summary: Create farmer
      responses:
        "201":
          description: Farmer created

  /admin/farmers/{id}:
    get:
      tags: [Farmers]
      summary: Get farmer details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Farmer details
    put:
      tags: [Farmers]
      summary: Update farmer
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Farmer updated

  /admin/farmers/{id}/deactivate:
    patch:
      tags: [Farmers]
      summary: Deactivate farmer
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Farmer deactivated

  /admin/products:
    get:
      tags: [Products]
      summary: Get products
      responses:
        "200":
          description: Product list
    post:
      tags: [Products]
      summary: Create product
      responses:
        "201":
          description: Product created

  /admin/products/{id}:
    get:
      tags: [Products]
      summary: Get product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product details
    put:
      tags: [Products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product updated
    delete:
      tags: [Products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product deleted

  /admin/deliveries:
    get:
      tags: [Deliveries]
      summary: Get deliveries
      responses:
        "200":
          description: Deliveries list
    post:
      tags: [Deliveries]
      summary: Record delivery
      responses:
        "201":
          description: Delivery recorded

  /admin/loans:
    get:
      tags: [Loans]
      summary: Get all loans
      responses:
        "200":
          description: Loans list

  /admin/loans/pending:
    get:
      tags: [Loans]
      summary: Get pending loans
      responses:
        "200":
          description: Pending loans

  /admin/loans/{id}/approve:
    post:
      tags: [Loans]
      summary: Approve loan
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Loan approved

  /admin/loans/{id}/disburse:
    post:
      tags: [Loans]
      summary: Disburse loan
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Loan disbursed

  /admin/payments/process:
    post:
      tags: [Payments]
      summary: Process payment
      responses:
        "200":
          description: Payment processed

  /admin/wallets/cooperative:
    get:
      tags: [Wallets]
      summary: Get cooperative wallet
      responses:
        "200":
          description: Wallet details

  /admin/wallets/cooperative/transactions:
    get:
      tags: [Wallets]
      summary: Get cooperative transactions
      responses:
        "200":
          description: Transaction list

  /admin/wallets/farmers/{farmerId}:
    get:
      tags: [Wallets]
      summary: Get farmer wallet
      parameters:
        - name: farmerId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Wallet details

  /admin/wallets/farmers/{farmerId}/transactions:
    get:
      tags: [Wallets]
      summary: Get farmer wallet transactions
      parameters:
        - name: farmerId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Transactions list

  /admin/notifications/send:
    post:
      tags: [Notifications]
      summary: Send SMS and in-app notification
      responses:
        "200":
          description: Notification sent

  /admin/notifications/coop:
    get:
      tags: [Notifications]
      summary: Get cooperative notifications
      responses:
        "200":
          description: Notifications list

  /audit-logs:
    get:
      tags: [Audit Logs]
      summary: Get audit logs
      responses:
        "200":
          description: Audit logs returned

  /audit-logs/user/{userId}:
    get:
      tags: [Audit Logs]
      summary: Get audit logs by user
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User audit logs

  /admin/dashboard:
    get:
      tags: [Dashboard]
      summary: Cooperative dashboard
      responses:
        "200":
          description: Dashboard statistics
